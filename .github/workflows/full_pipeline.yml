name: Full Pipeline (Manual)

on:
  workflow_dispatch:
    inputs:
      zinc_limit:
        description: "ZINC compounds to screen"
        required: false
        default: "10000"
      ki_cutoff:
        description: "ML Ki cutoff in nM"
        required: false
        default: "100"

jobs:
  phase1:
    name: "Phase 1 — Data Gathering"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p1-${{ hashFiles('requirements.txt') }}
      - run: pip install requests biopython
      - run: python run_pipeline.py --phases 1
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase1-data.tar.gz data/structures/ data/chembl/ data/zinc/
          gh release delete phase1-latest --yes 2>/dev/null || true
          gh release create phase1-latest --title "Phase 1 Data" --notes "phase 1" phase1-data.tar.gz

  phase3:
    name: "Phase 3 — ML Screening"
    needs: phase1
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p3-${{ hashFiles('requirements.txt') }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chemberta-v1
      - run: pip install torch transformers requests
      - name: Download phase 1 asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase1-latest --pattern "phase1-data.tar.gz"
          tar -xzf phase1-data.tar.gz
      - run: python run_pipeline.py --phases 3
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase3-ml-hits.tar.gz data/results/ml_hits.json data/results/casp9_model.pt
          gh release delete phase3-latest --yes 2>/dev/null || true
          gh release create phase3-latest --title "Phase 3 ML Hits" --notes "phase 3" phase3-ml-hits.tar.gz

  phase4:
    name: "Phase 4 — ADMET Filtering"
    needs: phase3
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p4-${{ hashFiles('requirements.txt') }}
      - run: pip install rdkit requests
      - name: Download phase 3 asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase3-latest --pattern "phase3-ml-hits.tar.gz"
          tar -xzf phase3-ml-hits.tar.gz
      - run: python run_pipeline.py --phases 4
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase4-admet-passed.tar.gz data/results/admet_passed.json
          gh release delete phase4-latest --yes 2>/dev/null || true
          gh release create phase4-latest --title "Phase 4 ADMET" --notes "phase 4" phase4-admet-passed.tar.gz

  phase5:
    name: "Phase 5 — Report"
    needs: phase4
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download phase 4 asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase4-latest --pattern "phase4-admet-passed.tar.gz"
          tar -xzf phase4-admet-passed.tar.gz
      - run: python run_pipeline.py --phases 5
      - name: Upload report as release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(ls data/results/report_*.md | head -1)
          gh release delete pipeline-report --yes 2>/dev/null || true
          gh release create pipeline-report \
            --title "Pipeline Report $(date +'%Y-%m-%d')" \
            --notes "Final Caspase-9 inhibitor candidates" \
            "$REPORT"
