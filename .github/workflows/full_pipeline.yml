name: Full Pipeline (Manual)

on:
  workflow_dispatch:
    inputs:
      zinc_limit:
        description: "ZINC compounds to screen"
        default: "1000"
      ki_cutoff:
        description: "ML Ki cutoff (nM) — lower = stricter"
        default: "10000"
      epochs:
        description: "Training epochs"
        default: "10"
      batch_size:
        description: "Batch size (lower = less RAM)"
        default: "16"
      chembl_limit:
        description: "Max ChEMBL inhibitors to fetch"
        default: "1000"
      docking_score_cutoff:
        description: "Vina score cutoff (kcal/mol)"
        default: "-7.0"
      top_n_candidates:
        description: "Top N candidates in final report"
        default: "20"

jobs:
  phase1:
    name: "Phase 1 — Data Gathering"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHEMBL_LIMIT: ${{ github.event.inputs.chembl_limit }}
      ZINC_SCREEN_LIMIT: ${{ github.event.inputs.zinc_limit }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p1-${{ hashFiles('requirements.txt') }}
      - run: pip install requests biopython
      - run: python run_pipeline.py --phases 1
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase1-data.tar.gz data/structures/ data/chembl/ data/zinc/
          gh release delete phase1-latest --yes 2>/dev/null || true
          gh release create phase1-latest --title "Phase 1 Data" --notes "phase 1" phase1-data.tar.gz
      - name: Summary
        run: |
          echo "## Phase 1 — Data Gathering ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ChEMBL limit | ${{ github.event.inputs.chembl_limit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZINC limit | ${{ github.event.inputs.zinc_limit }} |" >> $GITHUB_STEP_SUMMARY
          INHIB=$(cat data/chembl/casp9_inhibitors.json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "?")
          ZINC=$(ls data/zinc/*.json 2>/dev/null | head -1 | xargs -I{} python3 -c "import sys,json; print(len(json.load(open('{}')))" 2>/dev/null || echo "?")
          echo "| Inhibitors fetched | $INHIB |" >> $GITHUB_STEP_SUMMARY
          echo "| ZINC compounds | $ZINC |" >> $GITHUB_STEP_SUMMARY

  phase3:
    name: "Phase 3 — ML Screening"
    needs: phase1
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45
    env:
      CI: "true"
      ZINC_SCREEN_LIMIT: ${{ github.event.inputs.zinc_limit }}
      ML_KI_CUTOFF_NM: ${{ github.event.inputs.ki_cutoff }}
      EPOCHS: ${{ github.event.inputs.epochs }}
      BATCH_SIZE: ${{ github.event.inputs.batch_size }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p3-${{ hashFiles('requirements.txt') }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chemberta-v1
      - run: pip install --no-cache-dir torch transformers requests
      - name: Download phase 1 asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase1-latest --pattern "phase1-data.tar.gz"
          tar -xzf phase1-data.tar.gz
      - run: python run_pipeline.py --phases 3
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase3-ml-hits.tar.gz data/results/ml_hits.json data/results/casp9_model.pt
          gh release delete phase3-latest --yes 2>/dev/null || true
          gh release create phase3-latest --title "Phase 3 ML Hits" --notes "phase 3" phase3-ml-hits.tar.gz
      - name: Summary
        run: |
          echo "## Phase 3 — ML Screening ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Epochs | ${{ github.event.inputs.epochs }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch size | ${{ github.event.inputs.batch_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ki cutoff | ${{ github.event.inputs.ki_cutoff }} nM |" >> $GITHUB_STEP_SUMMARY
          echo "| ZINC screened | ${{ github.event.inputs.zinc_limit }} |" >> $GITHUB_STEP_SUMMARY
          HITS=$(cat data/results/ml_hits.json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "| ML hits | $HITS |" >> $GITHUB_STEP_SUMMARY

  phase4:
    name: "Phase 4 — ADMET Filtering"
    needs: phase3
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKING_SCORE_CUTOFF: ${{ github.event.inputs.docking_score_cutoff }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p4-${{ hashFiles('requirements.txt') }}
      - run: pip install rdkit requests
      - name: Download phase 3 asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase3-latest --pattern "phase3-ml-hits.tar.gz"
          tar -xzf phase3-ml-hits.tar.gz
      - run: python run_pipeline.py --phases 4
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase4-admet-passed.tar.gz data/results/admet_passed.json
          gh release delete phase4-latest --yes 2>/dev/null || true
          gh release create phase4-latest --title "Phase 4 ADMET" --notes "phase 4" phase4-admet-passed.tar.gz
      - name: Summary
        run: |
          echo "## Phase 4 — ADMET Filtering ✅" >> $GITHUB_STEP_SUMMARY
          PASSED=$(cat data/results/admet_passed.json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Candidates passed ADMET | $PASSED |" >> $GITHUB_STEP_SUMMARY

  phase5:
    name: "Phase 5 — Report"
    needs: phase4
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TOP_N_CANDIDATES: ${{ github.event.inputs.top_n_candidates }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download phase 4 asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase4-latest --pattern "phase4-admet-passed.tar.gz"
          tar -xzf phase4-admet-passed.tar.gz
      - run: python run_pipeline.py --phases 5
      - name: Upload report as release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(ls data/results/report_*.md | head -1)
          gh release delete pipeline-report --yes 2>/dev/null || true
          gh release create pipeline-report \
            --title "Pipeline Report $(date +'%Y-%m-%d')" \
            --notes "Final Caspase-9 inhibitor candidates" \
            "$REPORT"
      - name: Write report to workflow summary
        run: |
          REPORT=$(ls data/results/report_*.md | head -1)
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat "$REPORT" >> $GITHUB_STEP_SUMMARY
