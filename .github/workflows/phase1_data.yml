name: Phase 1 — Data Gathering

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  gather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p1-${{ hashFiles('requirements.txt') }}

      - run: pip install requests biopython

      - run: python run_pipeline.py --phases 1

      - name: Bundle phase 1 data
        run: tar -czf phase1-data.tar.gz data/structures/ data/chembl/ data/zinc/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete phase1-latest --yes 2>/dev/null || true
          gh release create phase1-latest \
            --title "Phase 1 Data" \
            --notes "Auto-generated phase 1 output" \
            phase1-data.tar.gz
