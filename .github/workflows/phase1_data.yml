name: Phase 1 — Data Gathering

on:
  workflow_dispatch:
    inputs:
      chembl_limit:
        description: "Max ChEMBL inhibitors to fetch"
        default: "1000"
      zinc_limit:
        description: "ZINC compounds to download"
        default: "1000"
  schedule:
    - cron: "0 0 * * 0"

jobs:
  gather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHEMBL_LIMIT: ${{ github.event.inputs.chembl_limit || '1000' }}
      ZINC_SCREEN_LIMIT: ${{ github.event.inputs.zinc_limit || '1000' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p1-${{ hashFiles('requirements.txt') }}
      - run: pip install requests biopython
      - run: python run_pipeline.py --phases 1
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase1-data.tar.gz data/structures/ data/chembl/ data/zinc/
          gh release delete phase1-latest --yes 2>/dev/null || true
          gh release create phase1-latest --title "Phase 1 Data" --notes "phase 1" phase1-data.tar.gz
      - name: Summary
        run: |
          echo "## Phase 1 — Data Gathering ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          INHIB=$(cat data/chembl/casp9_inhibitors.json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "?")
          echo "| Inhibitors fetched | $INHIB |" >> $GITHUB_STEP_SUMMARY
          echo "| PDB structures | 2AR9, 8A9L |" >> $GITHUB_STEP_SUMMARY
