name: Phase 3 — ML Screening

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Phase 1 — Data Gathering"]
    types: [completed]

jobs:
  ml-screen:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-phase3-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chemberta-v1

      - name: Install dependencies
        run: pip install torch transformers requests

      - name: Download Phase 1 data
        uses: actions/download-artifact@v4
        with:
          name: phase1-data
          path: data/

      - name: Run Phase 3
        run: python run_pipeline.py --phases 3

      - name: Upload ML hits
        uses: actions/upload-artifact@v4
        with:
          name: phase3-ml-hits
          path: data/results/ml_hits.json
          retention-days: 30
