name: Phase 3 — ML Screening

on:
  workflow_dispatch:
    inputs:
      zinc_limit:
        description: "ZINC compounds to screen"
        default: "1000"
      ki_cutoff:
        description: "ML Ki cutoff (nM)"
        default: "10000"
      epochs:
        description: "Training epochs"
        default: "10"
      batch_size:
        description: "Batch size"
        default: "16"
  workflow_run:
    workflows: ["Phase 1 — Data Gathering"]
    types: [completed]

jobs:
  ml-screen:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
    timeout-minutes: 145
    env:
      CI: "true"
      ZINC_SCREEN_LIMIT: ${{ github.event.inputs.zinc_limit || '1000' }}
      ML_KI_CUTOFF_NM: ${{ github.event.inputs.ki_cutoff || '10000' }}
      EPOCHS: ${{ github.event.inputs.epochs || '10' }}
      BATCH_SIZE: ${{ github.event.inputs.batch_size || '16' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p3-${{ hashFiles('requirements.txt') }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chemberta-v1
      - run: pip install --no-cache-dir torch transformers requests
      - name: Download phase 1 release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase1-latest --pattern "phase1-data.tar.gz"
          tar -xzf phase1-data.tar.gz
      - run: python run_pipeline.py --phases 3
      - name: Bundle and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf phase3-ml-hits.tar.gz data/results/ml_hits.json data/results/casp9_model.pt
          gh release delete phase3-latest --yes 2>/dev/null || true
          gh release create phase3-latest --title "Phase 3 ML Hits" --notes "phase 3" phase3-ml-hits.tar.gz
      - name: Summary
        run: |
          echo "## Phase 3 — ML Screening ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Epochs | ${EPOCHS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch size | ${BATCH_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ki cutoff | ${ML_KI_CUTOFF_NM} nM |" >> $GITHUB_STEP_SUMMARY
          HITS=$(cat data/results/ml_hits.json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "| ML hits | $HITS |" >> $GITHUB_STEP_SUMMARY
