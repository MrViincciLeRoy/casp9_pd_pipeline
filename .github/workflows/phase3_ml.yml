name: Phase 3 — ML Screening

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Phase 1 — Data Gathering"]
    types: [completed]

jobs:
  ml-screen:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
    timeout-minutes: 45
    env:
      CI: "true"
      ZINC_SCREEN_LIMIT: "1000"  # screen 1K in CI — run locally for full 10K+

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p3-${{ hashFiles('requirements.txt') }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chemberta-v1

      - name: Install dependencies
        run: pip install --no-cache-dir torch transformers requests

      - name: Download phase 1 release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase1-latest --pattern "phase1-data.tar.gz"
          tar -xzf phase1-data.tar.gz

      - name: Run Phase 3 (train only)
        run: python run_pipeline.py --phases 3

      - name: Bundle ML results
        run: |
          mkdir -p data/results
          tar -czf phase3-ml-hits.tar.gz data/results/ml_hits.json data/results/casp9_model.pt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete phase3-latest --yes 2>/dev/null || true
          gh release create phase3-latest \
            --title "Phase 3 ML Hits" \
            --notes "Auto-generated phase 3 output" \
            phase3-ml-hits.tar.gz
