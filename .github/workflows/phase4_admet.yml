name: Phase 4 — ADMET Filtering

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Phase 3 — ML Screening"]
    types: [completed]

jobs:
  admet-filter:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-p4-${{ hashFiles('requirements.txt') }}

      - run: pip install rdkit requests

      - name: Download phase 3 release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase3-latest --pattern "phase3-ml-hits.tar.gz"
          tar -xzf phase3-ml-hits.tar.gz

      - run: python run_pipeline.py --phases 4

      - name: Bundle ADMET results
        run: tar -czf phase4-admet-passed.tar.gz data/results/admet_passed.json

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete phase4-latest --yes 2>/dev/null || true
          gh release create phase4-latest \
            --title "Phase 4 ADMET Results" \
            --notes "Auto-generated phase 4 output" \
            phase4-admet-passed.tar.gz
