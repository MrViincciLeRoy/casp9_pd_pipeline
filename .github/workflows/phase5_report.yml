name: Phase 5 — Report Generation

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Phase 4 — ADMET Filtering"]
    types: [completed]

jobs:
  generate-report:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download phase 4 release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download phase4-latest --pattern "phase4-admet-passed.tar.gz"
          tar -xzf phase4-admet-passed.tar.gz

      - run: python run_pipeline.py --phases 5

      - name: Upload report to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(ls data/results/report_*.md | head -1)
          gh release delete pipeline-report --yes 2>/dev/null || true
          gh release create pipeline-report \
            --title "Pipeline Report $(date +'%Y-%m-%d')" \
            --notes "Final Caspase-9 inhibitor candidates" \
            "$REPORT"
