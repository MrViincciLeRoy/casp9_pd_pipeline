name: Phase 5 — Report Generation

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Phase 4 — ADMET Filtering"]
    types: [completed]

jobs:
  generate-report:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download ADMET results
        uses: actions/download-artifact@v4
        with:
          name: phase4-admet-passed
          path: data/results/

      - name: Run Phase 5
        run: python run_pipeline.py --phases 5

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: data/results/report_*.md
          retention-days: 90

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/report_*.md
          git diff --staged --quiet || git commit -m "chore: pipeline report $(date +'%Y-%m-%d')"
          git push
